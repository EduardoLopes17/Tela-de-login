<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="p-4">

<form>
    <div class="row mb-3">
        <label for="inputEmail3" class="col-sm-2 col-form-label">Email</label>
        <div class="col-sm-10">
            <input type="email" class="form-control" id="inputEmail3" placeholder="Digite seu email">
        </div> 
    </div>

    <div class="row mb-3">
        <label for="inputPassword3" class="col-sm-2 col-form-label">Senha</label>
        <div class="col-sm-10">
            <input type="password" class="form-control" id="inputPassword3" placeholder="Digite sua senha">
        </div>
    </div>

    <div class="mt-3">
        <p class="text-muted small"> Não tem uma conta? 
            <a href="#" class="text-decoration-none fw-bold text-primary">Cadastre-se aqui</a>
        </p>
    </div>

    <button type="submit" class="btn btn-primary">Entrar</button>
</form>

</body>
</html>
